interface:
  display_name: "Atmospheric Science Research"
  short_description: "Atmospheric/climate research and figure revision"
  default_prompt: "Use $atmospheric-science-research for file-based atmospheric or climate analysis tasks that need a real project structure, including NetCDF or GRIB, ERA5 or CMIP or WRF or satellite workflows, EOF or climatology or anomaly or trend or regression or correlation or composite or teleconnection diagnostics, vertical cross-sections, Hovmöller diagrams, and revisions to existing atmospheric or climate figures. Choose Full (Plan -> Execute -> Validate -> RR), Execute-lite (constrained Execute -> Validate -> RR), or RR-only (RR) as appropriate. Reuse an existing project's directories, filenames, and conventions before creating data_processed/ or figN/. Split compute from plotting, validate changed non-figure outputs by checking saved files plus key variables, dimensions, coordinates, units, and value range. Select cmaps colormaps from the variable-to-colormap table with discrete levels. Run physical-sense checks during RR. Ask the user only for scientific ambiguity. Update the Chinese README at the appropriate stage. Review actual rendered PNG or SVG figures before handoff."
