interface:
  display_name: "Atmospheric Science Research"
  short_description: "Atmospheric/climate research and figure revision"
  default_prompt: "Use $atmospheric-science-research for file-based atmospheric or climate analysis tasks that need a real project structure, including NetCDF or GRIB, ERA5 or CMIP or WRF workflows, EOF or climatology or anomaly or regression or composite diagnostics, and revisions to existing atmospheric or climate figures. Choose Full (Plan -> Execute -> RR), Execute-lite (constrained Execute -> RR), or RR-only (RR) as appropriate. Reuse an existing project's directories, filenames, and conventions before creating data_processed/ or figN/, read raw inputs from ~/code/data unless the project says otherwise, keep processed outputs out of that directory, split compute from plotting only when the work separates cleanly, validate changed non-figure outputs by checking saved files plus key variables, dimensions, coordinates, units, missing-data behavior, and value range, ask the user only for scientific ambiguity and prefer a single clarification stop, update the Chinese README at the appropriate stage, and review actual rendered PNG or SVG or PDF figures before handoff."
